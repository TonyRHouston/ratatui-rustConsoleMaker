name: Continuous Integration
permissions: {}
on:
  workflow_dispatch: {}
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
jobs:
  lint-formatting:
    name: Check Formatting
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
    - uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561
      with:
        toolchain: nightly
        components: rustfmt
    - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
    - uses: taiki-e/install-action@650c5ca14212efbbf3e580844b04bdccf68dac31
      with:
        tool: taplo-cli
    - run: cargo xtask format --check
  lint-typos:
    name: Check Typos
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
    - uses: crate-ci/typos@93cbdb2d23269548cf0db0f74d0bc6a09a3f0d5c
  cargo-deny:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        checks:
        - advisories
        - bans licenses sources
    continue-on-error: ${{ matrix.checks == 'advisories' }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
    - uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979
      with:
        rust-toolchain: stable
        log-level: info
        arguments: --all-features --exclude-unpublished
        command: check ${{ matrix.checks }}
  cargo-machete:
    name: Check Unused Dependencies
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
    - uses: bnjbvr/cargo-machete@7959c845782fed02ee69303126d4a12d64f1db18
  lint-clippy:
    name: Check Clippy
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain:
        - stable
        - beta
    continue-on-error: ${{ matrix.toolchain == 'beta' }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
    - uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561
      with:
        toolchain: ${{ matrix.toolchain }}
        components: clippy
    - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
    - run: cargo xtask clippy
      env:
        RUSTUP_TOOLCHAIN: ${{ matrix.toolchain }}
  lint-markdown:
    name: Check Markdown
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
    - uses: DavidAnson/markdownlint-cli2-action@07035fd053f7be764496c0f8d8f9f41f98305101
      with:
        globs: '''**/*.md''

          ''!target''

          '
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
    - uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561
      with:
        toolchain: stable
        components: llvm-tools
    - uses: taiki-e/install-action@650c5ca14212efbbf3e580844b04bdccf68dac31
      with:
        tool: cargo-llvm-cov
    - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
    - run: cargo xtask coverage
    - uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: true
  check:
    name: Check ${{ matrix.os }} ${{ matrix.toolchain }}
    strategy:
      fail-fast: false
      matrix:
        os:
        - ubuntu-latest
        - windows-latest
        - macos-latest
        toolchain:
        - 1.86.0
        - stable
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
    - uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561
      with:
        toolchain: ${{ matrix.toolchain }}
    - uses: taiki-e/install-action@650c5ca14212efbbf3e580844b04bdccf68dac31
      with:
        tool: cargo-hack
    - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
    - run: cargo xtask check --all-features
      env:
        RUSTUP_TOOLCHAIN: ${{ matrix.toolchain }}
  build-no-std:
    name: Build No-Std
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
    - uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561
      with:
        toolchain: stable
        targets: x86_64-unknown-none
    - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
    - run: cargo tree --target x86_64-unknown-none -p ratatui-core
    - run: cargo tree --target x86_64-unknown-none -p ratatui-widgets
    - run: cargo tree --target x86_64-unknown-none -p ratatui-macros
    - run: cargo tree --target x86_64-unknown-none -p ratatui --no-default-features
    - run: cargo build --target x86_64-unknown-none -p ratatui-core
    - run: cargo build --target x86_64-unknown-none -p ratatui-widgets
    - run: cargo build --target x86_64-unknown-none -p ratatui-macros
    - run: cargo build --target x86_64-unknown-none -p ratatui --no-default-features
  check-readme:
    name: Check README
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
    - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
    - uses: taiki-e/install-action@650c5ca14212efbbf3e580844b04bdccf68dac31
      with:
        tool: cargo-rdme
    - run: cargo xtask readme --check
  lint-docs:
    name: Check Docs
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -Dwarnings
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
    - uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561
      with:
        toolchain: nightly
    - uses: dtolnay/install@74f735cdf643820234e37ae1c4089a08fd266d8a
      with:
        crate: cargo-docs-rs
    - uses: taiki-e/install-action@650c5ca14212efbbf3e580844b04bdccf68dac31
      with:
        tool: cargo-hack
    - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
    - run: cargo xtask docs
  test-docs:
    name: Test Docs
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
    - uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561
      with:
        toolchain: stable
    - uses: taiki-e/install-action@650c5ca14212efbbf3e580844b04bdccf68dac31
      with:
        tool: cargo-hack
    - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
    - run: cargo xtask test-docs
  test-libs:
    name: Test Libs ${{ matrix.toolchain }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain:
        - 1.86.0
        - stable
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
    - uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561
      with:
        toolchain: stable
    - uses: taiki-e/install-action@650c5ca14212efbbf3e580844b04bdccf68dac31
      with:
        tool: cargo-hack
    - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
    - run: cargo xtask test-libs
  test-backends:
    name: Test ${{matrix.backend}} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
        - ubuntu-latest
        - windows-latest
        - macos-latest
        backend:
        - crossterm
        - termion
        - termwiz
        exclude:
        - os: windows-latest
          backend: termion
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
    - uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561
      with:
        toolchain: stable
    - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
    - run: cargo xtask test-backend ${{ matrix.backend }}
